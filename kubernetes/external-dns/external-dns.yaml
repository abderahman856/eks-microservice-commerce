apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: cert-manager # We can keep it here or in default
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.13.5
        args:
        - --source=ingress 
        - --domain-filter=baashe.uk 
        - --provider=cloudflare
        - --cloudflare-proxied 
        - --txt-owner-id=baashe-eks-cluster
        env:
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-api-token-secret
              key: api-token