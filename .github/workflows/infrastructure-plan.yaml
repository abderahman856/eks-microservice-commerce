name: Infrastructure Plan

on:
  push:
    branches: [ main ]
    paths: [ 'terraform/**']
  
  pull_request:
    branches: [ main ]
    paths: ['terraform/**']

jobs:
  tf-plan:
    name: "Terraform Security and Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: false

      - name: Terraform init
        id: init
        working-directory: ./terraform
        run: terraform init
      
      - name: Terraform validate
        id: validate
        working-directory: ./terraform
        run: terraform validate -no-color

      - name: Checkov Security Scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./terraform
          framework: terraform
          quiet: false
          soft_fail: true
          output_format: cli,sarif
      
      - name: terraform plan
        id: plan
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
          TF_VAR_dbPassword: ${{ secrets.DB_PASSWORD }} 
        run: |
          echo "=========================================================="
          echo " GENERATING INFRASTRUCTURE PLAN"
          echo "=========================================================="
          terraform plan -no-color -input=false -out=tfplan

      - name: Job Summary
        run: |
          echo " Terraform Plan Result" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ steps.fmt.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Init | ${{ steps.init.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ steps.validate.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plan | ${{ steps.plan.outcome }} |" >> $GITHUB_STEP_SUMMARY
          
          echo " Plan Details" >> $GITHUB_STEP_SUMMARY
          echo "Check the detailed logs to see which EKS resources will be added/modified." >> $GITHUB_STEP_SUMMARY
